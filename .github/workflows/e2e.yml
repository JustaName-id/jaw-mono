name: E2E (iframe transport)

# Real-browser smoke test for the embedded iframe transport across all three
# engines (chromium, firefox, webkit≈Safari). It does NOT drive the passkey
# flow (Chromium-only virtual authenticator), so it needs no API key — only the
# two dev servers and the prewarmed, load-time iframe state.

on:
  pull_request:
    paths:
      - 'packages/core/src/communicator/**'
      - 'apps/keys-jaw-id/**'
      - 'apps/playground/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      # The playground consumes the BUILT dist of the SDK packages, not source —
      # build them first so it serves the current transport code.
      - name: Build SDK packages
        run: bunx nx run-many -t build -p @jaw.id/core @jaw.id/wagmi @jaw.id/ui

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium firefox webkit

      - name: Start servers and run e2e (chromium, firefox, webkit)
        run: |
          # Kill the backgrounded dev servers on exit (belt-and-suspenders; the
          # runner also reaps the process tree at job end).
          trap 'kill $(jobs -p) 2>/dev/null' EXIT

          bunx nx dev @jaw-mono/keys-jaw-id --port=3001 > /tmp/keys.log 2>&1 &
          NEXT_PUBLIC_KEYS_URL=http://localhost:3001 \
            bunx nx dev @jaw-mono/playground --port=3002 > /tmp/playground.log 2>&1 &

          # Wait until both respond (dev compiles on first hit).
          up=0
          for i in $(seq 1 90); do
            if curl -sf -o /dev/null http://localhost:3001/ \
               && curl -sf -o /dev/null http://localhost:3002/wagmi; then up=1; break; fi
            sleep 2
          done
          if [ "$up" != "1" ]; then
            echo "::error::dev servers did not start in time"
            tail -n 60 /tmp/keys.log /tmp/playground.log
            exit 1
          fi

          fail=0
          # Default: see-through on Chromium; clickjacking-guard fallback on FF/WebKit.
          for engine in chromium firefox webkit; do
            echo "::group::e2e $engine (default)"
            JAW_E2E_BROWSER=$engine node e2e/iframe-transport.e2e.mjs || fail=1
            echo "::endgroup::"
          done
          # Error path: keys unreachable ⇒ graceful degradation (no broken frame, no hang).
          # webkit skipped: without a trusted host it never embeds the iframe, so
          # keys-down is a no-op there (covered by the default-mode guard above).
          for engine in chromium firefox; do
            echo "::group::e2e $engine (keys-down)"
            JAW_E2E_BROWSER=$engine JAW_E2E_KEYS_DOWN=1 node e2e/iframe-transport.e2e.mjs || fail=1
            echo "::endgroup::"
          done
          exit $fail
